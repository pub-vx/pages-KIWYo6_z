<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국-일본 항공편 대시보드</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F9FA;
  --white:#FFFFFF;
  --blue:#1A73E8;
  --green:#34A853;
  --text:#202124;
  --text2:#5F6368;
  --border:#E8EAED;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
  --radius:12px;
}
body{font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD1D8;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9AA0A6}

/* HEADER */
#header{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;gap:24px;flex-shrink:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;flex-shrink:0}
.header-title{font-size:17px;font-weight:600;color:var(--text)}
.header-sub{font-size:13px;color:var(--text2);font-weight:400}
.header-divider{width:1px;height:32px;background:var(--border)}
.header-stats{display:flex;gap:20px;margin-left:auto}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-label{font-size:11px;color:var(--text2);font-weight:500;letter-spacing:.3px}
.stat-value{font-size:20px;font-weight:700;color:var(--blue);line-height:1}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:280px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-section{padding:16px 16px 0}
.sidebar-section:last-child{padding-bottom:16px}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s ease;user-select:none;white-space:nowrap}
.chip:hover{border-color:#C0C6CE;background:#F1F3F4}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.jp.active{background:var(--green);border-color:var(--green);color:#fff}
.chip .iata{font-size:11px;opacity:.85}
.region-label{font-size:11px;color:var(--text2);font-weight:600;width:100%;margin-top:8px;margin-bottom:4px}
.sidebar-divider{height:1px;background:var(--border);margin:14px 16px}
/* Direction toggle */
.dir-pills{display:flex;gap:6px;margin-bottom:12px}
.dir-pill{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s ease}
.dir-pill:hover{border-color:#C0C6CE;background:#F1F3F4}
.dir-pill.active{background:var(--blue);border-color:var(--blue);color:#fff}
/* Airlines */
.airline-group-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:8px;margin-top:10px}
.airline-checks{display:flex;flex-direction:column;gap:5px}
.airline-check{display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 6px;border-radius:6px;transition:background .15s}
.airline-check:hover{background:#F1F3F4}
.airline-check input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--blue)}
.airline-code{font-size:12px;font-weight:600;padding:2px 6px;border-radius:4px;color:#fff;min-width:28px;text-align:center}
.airline-name{font-size:12px;color:var(--text)}
.reset-btn{margin:14px 16px 16px;padding:10px;background:#F1F3F4;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;width:calc(100% - 32px);transition:all .15s}
.reset-btn:hover{background:#E8EAED;color:var(--text)}

/* MAP */
#map-wrap{flex:1;position:relative;min-width:0}
#map{width:100%;height:100%}
.leaflet-container{background:#EEF2F7}
/* SVG arc overlay */
#arc-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:400}

/* RIGHT PANEL */
#right-panel{width:400px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.rp-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-title-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.rp-title{font-size:15px;font-weight:600;color:var(--text)}
.count-badge{background:#E8F0FE;color:var(--blue);font-size:12px;font-weight:600;padding:2px 8px;border-radius:12px}
.sort-tabs{display:flex;gap:4px}
.sort-tab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s}
.sort-tab:hover{background:#F1F3F4}
.sort-tab.active{background:#E8F0FE;border-color:#C5D8FB;color:var(--blue)}
.rp-list{flex:1;overflow-y:auto;padding:8px 0}
/* Route group */
.route-group{margin-bottom:4px}
.route-header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 6px;background:var(--bg);border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.route-name{font-size:12px;font-weight:600;color:var(--text2)}
.route-count{font-size:11px;color:var(--text2);background:var(--border);border-radius:10px;padding:1px 7px}
/* Flight row */
.flight-row{display:flex;align-items:center;padding:10px 20px;border-bottom:1px solid #F1F3F4;gap:10px;transition:background .1s}
.flight-row:hover{background:#F8F9FA}
.al-badge{font-size:10px;font-weight:700;color:#fff;padding:3px 6px;border-radius:5px;min-width:30px;text-align:center;flex-shrink:0}
.fl-no{font-size:12px;font-weight:600;color:var(--text);min-width:60px;flex-shrink:0}
.fl-times{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.fl-dep,.fl-arr{font-size:13px;font-weight:600;color:var(--text)}
.fl-arrow{color:var(--text2);font-size:11px}
.fl-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.fl-duration{font-size:11px;color:var(--blue);font-weight:500}
.fl-days{font-size:10px;color:var(--text2);max-width:90px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:12px;color:var(--text2)}
.empty-icon{font-size:40px;opacity:.4}
.empty-text{font-size:14px;font-weight:500}
.empty-sub{font-size:12px;opacity:.8}
/* Loading overlay */
.loading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s}
.loading-overlay.show{opacity:1;pointer-events:all}
.loader{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Transition for list */
.rp-list{transition:opacity .15s}
.rp-list.fading{opacity:0}
.kr-hint{font-size:11px;color:#9AA0A6;margin-bottom:10px;line-height:1.4}
.chip.dimmed{opacity:0.25;cursor:default;pointer-events:none}
.chip.auto-active{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.jp.auto-active{background:var(--green);border-color:var(--green);color:#fff}
/* JP chips: single-click highlight with stronger visual */
.chip.jp.active{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 2px 8px rgba(52,168,83,0.4)}
/* Airport tooltip labels */
.leaflet-tooltip.ap-tooltip {
  background: transparent;
  border: none;
  box-shadow: none;
  padding: 0;
  pointer-events: none;
}
.leaflet-tooltip.ap-tooltip::before { display:none; }
.ap-label {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  pointer-events: none;
}
.ap-label .ap-name {
  font-size: 10px;
  font-weight: 700;
  white-space: nowrap;
  padding: 2px 5px;
  border-radius: 3px;
  line-height: 1.3;
}
.ap-label.kr .ap-name {
  color: #1A73E8;
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(26,115,232,0.25);
}
.ap-label.jp .ap-name {
  color: #1E8449;
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(52,168,83,0.25);
}
.ap-label .ap-code {
  font-size: 9px;
  font-weight: 600;
  opacity: 0.65;
  color: inherit;
}
.leaflet-tooltip.pref-tooltip {
  background: rgba(255,255,255,0.85);
  border: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  font-size: 11px;
  font-weight: 500;
  color: #333;
  padding: 3px 7px;
  border-radius: 4px;
  pointer-events: none;
}
.leaflet-tooltip.pref-tooltip::before { display:none; }

/* ── MOBILE BOTTOM TAB BAR ─────────────────────────────────────────── */
#mobile-tabs { display:none; }

/* ── RESPONSIVE ────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  /* Header: compact */
  #header {
    height: 52px;
    padding: 0 16px;
    gap: 12px;
  }
  .header-title { font-size: 15px; }
  .header-sub { display: none; }
  .header-divider { display: none; }
  .header-stats { display: none; }

  /* Main: full height minus header + tab bar */
  #main {
    flex-direction: column;
    height: calc(100dvh - 52px - 56px);
    overflow: hidden;
  }

  /* Each panel hidden by default, shown with .mob-active */
  #sidebar {
    width: 100%;
    height: 100%;
    border-right: none;
    border-top: 1px solid var(--border);
    display: none;
    overflow-y: auto;
    flex-direction: column;
  }
  #sidebar.mob-active { display: flex; }

  #map-wrap {
    width: 100%;
    height: 100%;
    display: none;
  }
  #map-wrap.mob-active { display: block; }

  #right-panel {
    width: 100%;
    height: 100%;
    border-left: none;
    border-top: 1px solid var(--border);
    display: none;
    flex-direction: column;
  }
  #right-panel.mob-active { display: flex; }

  /* Bottom tab bar */
  #mobile-tabs {
    display: flex;
    height: 56px;
    background: var(--white);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }
  .mob-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: color .15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .mob-tab.active { color: var(--blue); }
  .mob-tab-icon { font-size: 20px; line-height: 1; }

  /* Flight row tweak for smaller screens */
  .flight-row { padding: 10px 14px; gap: 8px; }
  .fl-no { min-width: 52px; font-size: 11px; }
  .fl-dep,.fl-arr { font-size: 12px; }
  .rp-header { padding: 12px 14px 10px; }

  /* Chip sizing */
  .chip { font-size: 11px; padding: 5px 9px; }

  /* Reset btn: stick to bottom of sidebar */
  .reset-btn { margin: 10px 16px 16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-brand">
    <div class="header-logo">✈</div>
    <div>
      <div class="header-title">한국 ↔ 일본 항공편</div>

  <div class="header-stats">

      <span class="stat-label">항공사</span>
      <span class="stat-value" id="stat-airlines">0</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="section-title">도착 공항 (일본)</div>
      <div id="jp-chips-container"></div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="section-title">출발 가능 공항 (한국)</div>

      <div class="chips-wrap" id="kr-chips"></div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">

      <div class="dir-pills">

        <div class="dir-pill" data-dir="outbound" onclick="setDir('outbound')">일본 → 한국</div>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="section-title">항공사</div>
      <div class="airline-group-label">한국 항공사</div>
      <div class="airline-checks" id="kr-airlines"></div>
      <div class="airline-group-label" style="margin-top:14px">일본 항공사</div>
      <div class="airline-checks" id="jp-airlines"></div>
    </div>

    <button class="reset-btn" onclick="resetFilters()">필터 초기화</button>
  </div>

  <!-- MAP -->
  <div id="map-wrap">
    <div id="map"></div>
    <svg id="arc-svg"></svg>
    <div class="loading-overlay" id="loading"><div class="loader"></div></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="rp-header">
      <div class="rp-title-row">
        <span class="rp-title">검색 결과</span>
        <span class="count-badge" id="result-count">0편</span>
      </div>
      <div class="sort-tabs">
        <button class="sort-tab active" data-sort="dep" onclick="setSort('dep')">출발시간순</button>
        <button class="sort-tab" data-sort="al" onclick="setSort('al')">항공사순</button>
        <button class="sort-tab" data-sort="route" onclick="setSort('route')">노선순</button>
      </div>
    </div>
    <div class="rp-list" id="flight-list"></div>
  </div>

</div>

<!-- MOBILE BOTTOM TAB BAR -->
<div id="mobile-tabs">
  <div class="mob-tab active" id="mob-tab-jp" onclick="showMobTab('jp')">
    <span class="mob-tab-icon">🗾</span>
    <span>일본 공항</span>
  </div>
  <div class="mob-tab" id="mob-tab-map" onclick="showMobTab('map')">
    <span class="mob-tab-icon">📍</span>
    <span>지도</span>
  </div>
  <div class="mob-tab" id="mob-tab-flights" onclick="showMobTab('flights')">
    <span class="mob-tab-icon">✈</span>
    <span id="mob-flight-count">항공편</span>
  </div>
</div>

function computeActiveKr(){
  activeKr = new Set();
  if(selJp.size === 0){
    // no JP selected: show all KR as available
    KR_CODES.forEach(c => activeKr.add(c));
  } else {
    Object.entries(FLIGHTS).forEach(([jpCode, data])=>{
      if(!selJp.has(jpCode)) return;
      const flights = data[direction]||[];
      flights.forEach(f=>{
        const krCode = direction==='inbound'?f.from:f.to;
        if(selAl.has(f.al)) activeKr.add(krCode);
      });
    });
  }
  // selKr = all activeKr by default (auto-activate all reachable KR airports)
  selKr = new Set(activeKr);
  // Update KR chip visuals
  document.querySelectorAll('#kr-chips .chip').forEach(chip=>{
    const code = chip.dataset.code;
    if(activeKr.has(code)){
      chip.classList.remove('dimmed');
      chip.classList.add('active');
      chip.style.pointerEvents = 'auto';
      chip.style.opacity = '1';
    } else {
      chip.classList.remove('active');
      chip.classList.add('dimmed');
    }
  });
  // Update KR markers on map
  KR_CODES.forEach(code=>{
    const m = krMarkers[code];
    if(!m) return;
    const isActive = activeKr.has(code);
    m.setStyle({fillOpacity:isActive?1:0.15, fillColor:isActive?'#1A73E8':'#9AA0A6'});
  });
  // Mobile: auto-switch to map tab after JP airport selected
  if(typeof isMobile === 'function' && isMobile() && selJp.size > 0 && typeof currentMobTab !== 'undefined' && currentMobTab === 'jp'){
    setTimeout(()=> showMobTab('map'), 250);
  }
}

function buildAlChecks(containerId, codes){
  const container = document.getElementById(containerId);
  codes.forEach(code=>{
    const label = document.createElement('label');
    label.className = 'airline-check';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = true;
    cb.dataset.al = code;
    cb.onchange = ()=>{
      if(cb.checked) selAl.add(code); else selAl.delete(code);
      computeActiveKr(); // recompute since airline filter changed
      scheduleUpdate();
    };
    const badge = document.createElement('span');
    badge.className = 'airline-code';
    badge.style.background = AL_COLORS[code]||'#666';
    badge.textContent = code;
    const name = document.createElement('span');
    name.className = 'airline-name';
    name.textContent = AL_NAMES[code]||code;
    label.appendChild(cb);
    label.appendChild(badge);
    label.appendChild(name);
    container.appendChild(label);
  });
}

function toggleJp(code, chip){
  const wasSelected = selJp.has(code);
  // radio behavior: clear all before selecting
  selJp.clear();
  document.querySelectorAll('#jp-chips-container .chip').forEach(c=>c.classList.remove('active'));
  if(!wasSelected){
    selJp.add(code);
    chip.classList.add('active');
  }
  computeActiveKr();
  scheduleUpdate();
}
function toggleJpByCode(code){
  const wasSelected = selJp.has(code);
  // radio behavior: clear all before selecting
  selJp.clear();
  document.querySelectorAll('#jp-chips-container .chip').forEach(c=>c.classList.remove('active'));
  if(!wasSelected){
    selJp.add(code);
    const chip = document.querySelector(`#jp-chips-container .chip[data-code="${code}"]`);
    if(chip) chip.classList.add('active');
  }
  computeActiveKr();
  scheduleUpdate();
}
function toggleKr(code, chip){
  if(!activeKr.has(code)) return; // can't toggle inactive KR airports
  if(selKr.has(code)){ selKr.delete(code); chip.classList.remove('active'); }
  else { selKr.add(code); chip.classList.add('active'); }
  scheduleUpdate();
}
function toggleKrByCode(code){
  if(!activeKr.has(code)) return;
  if(selKr.has(code)) selKr.delete(code); else selKr.add(code);
  const chip = document.querySelector(`#kr-chips .chip[data-code="${code}"]`);
  if(chip) chip.classList.toggle('active', selKr.has(code));
  scheduleUpdate();
}
function updateChipStyle(chip, isActive, isJp){
  if(isActive){ chip.classList.add('active'); }
  else { chip.classList.remove('active'); }
}

// ===== ARC DRAWING =====
function latLngToSvgXY(latlng){
  const p = map.latLngToContainerPoint(latlng);
  return [p.x, p.y];
}

function drawArcs(){
  arcSvg.innerHTML='';
  const mapWrap = document.getElementById('map-wrap');
  arcSvg.setAttribute('viewBox',`0 0 ${mapWrap.clientWidth} ${mapWrap.clientHeight}`);

  const routes = getActiveRoutes();
  routes.forEach(({from,to})=>{
    if(!AP[from]||!AP[to]) return;
    const [x1,y1] = latLngToSvgXY(AP[from]);
    const [x2,y2] = latLngToSvgXY(AP[to]);
    // Control point: mid, offset northward (up in screen = negative y)
    const mx = (x1+x2)/2;
    const my = (y1+y2)/2 - Math.abs(x2-x1)*0.25;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
    path.setAttribute('stroke','#1A73E8');
    path.setAttribute('stroke-opacity','0.35');
    path.setAttribute('stroke-width','1.8');
    path.setAttribute('fill','none');
    path.setAttribute('stroke-linecap','round');
    arcSvg.appendChild(path);
  });
}

function getActiveRoutes(){
  if(selJp.size === 0) return [];
  const routes=[];
  const seen=new Set();
  Object.entries(FLIGHTS).forEach(([jpCode,data])=>{
    if(!selJp.has(jpCode)) return;
    const flights = data[direction]||[];
    flights.forEach(f=>{
      const krCode = direction==='inbound'?f.from:f.to;
      if(!selKr.has(krCode)) return;
      if(!selAl.has(f.al)) return;
      const key = `${krCode}-${jpCode}`;
      if(!seen.has(key)){
        seen.add(key);
        routes.push({from:krCode,to:jpCode});
      }
    });
  });
  return routes;
}

function updateMarkers(){
  // Highlight active kr markers
  KR_CODES.forEach(code=>{
    const m = krMarkers[code];
    if(!m) return;
    const isActive = selKr.has(code) && activeKr.has(code);
    m.setStyle({fillOpacity:isActive?1:0.15, fillColor:isActive?'#1A73E8':'#9AA0A6'});
  });
  // Highlight active jp markers
  ALL_JP.forEach(code=>{
    const m = jpMarkers[code];
    if(!m) return;
    const isActive = selJp.has(code) && FLIGHTS[code];
    m.setStyle({fillOpacity:isActive?1:0.25, fillColor:isActive?'#34A853':'#9AA0A6'});
  });
}

// ===== FLIGHT LIST =====
function calcDuration(dep,arr){
  const dp = dep.replace('+1','');
  const ap = arr.replace('+1','');
  const [dh,dm] = dp.split(':').map(Number);
  const [ah,am] = ap.split(':').map(Number);
  let mins = (ah*60+am)-(dh*60+dm);
  if(arr.includes('+1')) mins+=1440;
  if(mins<0) mins+=1440;
  const h=Math.floor(mins/60), m=mins%60;
  return m>0?`${h}h ${m}m`:`${h}h`;
}

function getFilteredFlights(){
  if(selJp.size === 0) return []; // no JP airport selected = no results
  const result=[];
  Object.entries(FLIGHTS).forEach(([jpCode,data])=>{
    if(!selJp.has(jpCode)) return;
    const flights = data[direction]||[];
    flights.forEach(f=>{
      const krCode = direction==='inbound'?f.from:f.to;
      if(!selKr.has(krCode)) return;
      if(!selAl.has(f.al)) return;
      const fromCode = direction==='inbound'?krCode:'HND'||jpCode;
      const toCode   = direction==='inbound'?jpCode:krCode;
      result.push({...f, krCode, jpCode, toCode, fromCode});
    });
  });
  return result;
}

function renderFlightList(){
  const list = document.getElementById('flight-list');
  list.classList.add('fading');
  setTimeout(()=>{
    const flights = getFilteredFlights();
    // Sort
    if(sortMode==='dep'){
      flights.sort((a,b)=>a.dep.localeCompare(b.dep));
    } else if(sortMode==='al'){
      flights.sort((a,b)=>a.al.localeCompare(b.al)||a.dep.localeCompare(b.dep));
    } else {
      // route sort
      flights.sort((a,b)=>{
        const ra = `${a.krCode}-${a.jpCode}`;
        const rb = `${b.krCode}-${b.jpCode}`;
        return ra.localeCompare(rb)||a.dep.localeCompare(b.dep);
      });
    }

    // Group by route
    const groups={};
    const order=[];
    flights.forEach(f=>{
      const key = direction==='inbound'
        ?`${f.krCode}-${f.jpCode}`
        :`${f.jpCode}-${f.krCode}`;
      if(!groups[key]){ groups[key]=[]; order.push(key); }
      groups[key].push(f);
    });

    document.getElementById('result-count').textContent = `${flights.length}편`;

    if(selJp.size === 0){
      list.innerHTML=`<div class="empty-state"><div class="empty-icon">🗾</div><div class="empty-text">일본 공항을 선택해주세요</div><div class="empty-sub">도착 공항을 클릭하면 출발 가능한 한국 공항과 항공편이 표시됩니다</div></div>`;
      list.classList.remove('fading');
      return;
    }
    if(flights.length===0){
      list.innerHTML=`<div class="empty-state"><div class="empty-icon">✈</div><div class="empty-text">검색 결과 없음</div><div class="empty-sub">필터 조건을 변경해 보세요</div></div>`;
      list.classList.remove('fading');
      return;
    }

    let html='';
    order.forEach(key=>{
      const group = groups[key];
      const f0 = group[0];
      let routeLabel;
      if(direction==='inbound'){
        routeLabel=`${KR_NAMES[f0.krCode]||f0.krCode}(${f0.krCode}) → ${JP_NAMES[f0.jpCode]||f0.jpCode}(${f0.jpCode})`;
      } else {
        routeLabel=`${JP_NAMES[f0.jpCode]||f0.jpCode}(${f0.jpCode}) → ${KR_NAMES[f0.krCode]||f0.krCode}(${f0.krCode})`;
      }
      html+=`<div class="route-group"><div class="route-header"><span class="route-name">${routeLabel}</span><span class="route-count">${group.length}편</span></div>`;
      group.forEach(f=>{
        const color = AL_COLORS[f.al]||'#666';
        const dur = calcDuration(f.dep,f.arr);
        const noDisplay = f.no.replace(/[ab]$/,''); // clean duplicates
        html+=`<div class="flight-row">
          <span class="al-badge" style="background:${color}">${f.al}</span>
          <span class="fl-no">${noDisplay}</span>
          <div class="fl-times">
            <span class="fl-dep">${f.dep}</span>
            <span class="fl-arrow">→</span>
            <span class="fl-arr">${f.arr}</span>
          </div>
          <div class="fl-right">
            <span class="fl-duration">${dur}</span>
            <span class="fl-days" title="${f.days}">${f.days}</span>
          </div>
        </div>`;
      });
      html+='</div>';
    });
    list.innerHTML=html;
    list.classList.remove('fading');
  },120);
}

function updateStats(){
  const flights = getFilteredFlights();
  const routes = new Set(flights.map(f=>`${f.krCode}-${f.jpCode}`));
  const airlines = new Set(flights.map(f=>f.al));
  document.getElementById('stat-routes').textContent = routes.size;
  document.getElementById('stat-flights').textContent = flights.length;
  document.getElementById('stat-airlines').textContent = airlines.size;
}

// ── MOBILE TAB NAVIGATION ──────────────────────────────────────────
let currentMobTab = 'jp';
function isMobile(){ return window.innerWidth <= 768; }

function showMobTab(tab){
  currentMobTab = tab;
  ['jp','map','flights'].forEach(t => {
    document.getElementById(`mob-tab-${t}`)?.classList.toggle('active', t === tab);
  });
  const sidebar = document.getElementById('sidebar');
  const mapWrap = document.getElementById('map-wrap');
  const panel   = document.getElementById('right-panel');
  sidebar.classList.toggle('mob-active', tab === 'jp');
  mapWrap.classList.toggle('mob-active', tab === 'map');
  panel.classList.toggle('mob-active',   tab === 'flights');
  if(tab === 'map' && map){
    setTimeout(()=>{ map.invalidateSize(); drawArcs(); }, 50);
  }
}

function initMobileLayout(){
  if(!isMobile()) return;
  // default: show sidebar (JP airport selector)
  showMobTab('jp');
}

window.addEventListener('load', ()=>{
  init();
  initMobileLayout();
});
window.addEventListener('resize', ()=>{
  if(map) drawArcs();
  if(isMobile() && !document.getElementById('sidebar').classList.contains('mob-active')
    && !document.getElementById('map-wrap').classList.contains('mob-active')
    && !document.getElementById('right-panel').classList.contains('mob-active')){
    showMobTab('jp');
  }
});
</script>
